# 实验环境配置
seed: 42
data_dir: "data/raw/A_etfs"
output_dir: "outputs"
trading_days_path: "data/tradingdays(2013-2025).csv"

# 资产配置
tickers: ["EEM", "EFA", "JPXN", "SPY", "XLK", "VTI", "AGG", "DBC"]

# 数据时间范围
start_date: "2019-01-01"
end_date: "2025-12-31"
backtest_start_date: "2020-01-01"  # 可选：显式指定回测起点（需 >= start_date + window_months）

# 特征配置
add_vix: False  # 是否在特征中加入 VIX 指标
prediction_return_clip: 0.1  
# 模式选择
model_type: "markowitz"  # 可选: standard, cvar, markowitz
pred_type: "linear"    # 可选: linear

# 核心超参数
hyperparams:
  fee_rate: 0.005
  window_months: 9
  epochs: 20
  lr: 0.001
  batch_size: 32
  rebalance_freq: "MS"
  context_history: 60

# 模型特定参数
model_args:
  alpha: 0.95          # 仅用于 cvar
  lambda_cvar: 1.0     # 仅用于 cvar
  lambda_risk: 20     # 仅用于 markowitz
  cov_history: 159     # 仅用于 markowitz
  cov_reg: 0.000001    # 仅用于 markowitz
  budget: 1.0

# Baseline 参数
baseline_args:
  risk_aversion: 10.0
  po_pred_epochs: 30
  po_pred_lr: 0.001