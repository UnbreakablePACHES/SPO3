# 实验环境配置
seed: 42
data_dir: "data/raw/B_stocks"
output_dir: "outputs"
trading_days_path: "data/tradingdays(2013-2025).csv"

# 资产配置
tickers: [
    "AAPL", "MSFT", "GOOGL", "AMZN", "META", "NVDA", "TSLA", "JPM", "V",
    "UNH", "HD", "PG", "MA", "DIS", "KO", "PEP", "INTC", "CSCO", "XOM", "CVX"
]

# 数据时间范围
start_date: "2019-01-01"
end_date: "2025-12-31"
backtest_start_date: "2020-01-01"  # 可选：显式指定回测起点（需 >= start_date + window_months）

# 特征配置
add_vix: False  # 是否在特征中加入 VIX 指标

# 模式选择
model_type: "standard"  # 可选: standard, cvar
pred_type: "linear"    # 可选: linear

# 核心超参数
hyperparams:
  fee_rate: 0.002
  window_months: 9
  epochs: 20
  lr: 0.001
  batch_size: 32
  rebalance_freq: "MS"
  context_history: 20  # CVaR 场景历史窗口长度（仅 model_type=cvar 时生效）

# 模型特定参数
model_args:
  alpha: 0.95          # 仅用于 cvar
  lambda_cvar: 1.0     # 仅用于 cvar
  budget: 1.0
